<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OntoForge</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230b0d10'/%3E%3Ccircle cx='8' cy='8' r='3' fill='%23e8a33d'/%3E%3Ccircle cx='3' cy='4' r='1.2' fill='%23b97c26'/%3E%3Ccircle cx='13' cy='12' r='1.2' fill='%23b97c26'/%3E%3Cpath d='M4 4.8 6.5 6.9M9.5 9.1 12 11.2' stroke='%23b97c26' stroke-width='.6'/%3E%3C/svg%3E">
<link rel="modulepreload" href="/static/app.js">
<link rel="modulepreload" href="/static/js/core.js">
<link rel="modulepreload" href="/static/js/bus.js">
<link rel="modulepreload" href="/static/js/wm.js">
<link rel="modulepreload" href="/static/js/dock.js">
<link rel="modulepreload" href="/static/js/spotlight.js">
<link rel="modulepreload" href="/static/js/constellation.js">
<link rel="modulepreload" href="/static/js/apps/registry.js">
<script src="/static/vendor/vega.min.js" defer></script>
<script src="/static/vendor/vega-lite.min.js" defer></script>
<script src="/static/vendor/vega-embed.min.js" defer></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════ menu bar -->
<header id="menubar" class="menubar">
  <span class="wordmark" title="OntoForge — the ontology operating system">
    <span class="wm-onto">Onto</span><span class="wm-spark" aria-hidden="true">&#9679;</span><span class="wm-forge">Forge</span>
  </span>
  <span class="mb-sub">the ontology operating system</span>
  <div class="mb-meta">
    <span class="meta-cell">estate <b id="meta-estate">&mdash;</b></span>
    <span class="meta-cell">atoms <b id="meta-atoms">&mdash;</b></span>
    <span class="meta-cell">cost <b id="meta-cost">&mdash;</b><i>&thinsp;tok</i></span>
    <button class="spotlight-hint" id="spotlight-hint" type="button" title="spotlight — search everything">
      <span class="sh-glass" aria-hidden="true">&#8981;</span><kbd>&#8984;K</kbd>
    </button>
  </div>
</header>

<!-- ═══════════════════════════════════════════ the workspace void -->
<main id="desktop" class="desktop" aria-label="workspace">
  <div id="epigraph" class="epigraph" aria-hidden="true">
    <p class="epi-line">struck from source atoms &mdash;<br>nothing asserted without a derivation</p>
    <p class="epi-hint">press <kbd>/</kbd> or just type</p>
  </div>
  <!-- windows are born here; the snap preview ghost is WM-owned -->
</main>

<!-- ═══════════════════════════════════════════════════════ the dock -->
<nav id="dock" class="dock" aria-label="dock"></nav>

<!-- ══════════════════════════════════════════════════════ spotlight -->
<div id="spotlight" class="spotlight" hidden role="dialog" aria-label="spotlight search">
  <div class="spot-box">
    <input id="spotlight-input" class="spot-input" type="text" spellcheck="false"
           role="combobox" aria-expanded="false" aria-autocomplete="list"
           aria-controls="spotlight-results"
           placeholder="search the estate &mdash; or ask it anything&hellip;">
    <div id="spotlight-results" class="spot-results" role="listbox" aria-label="results"></div>
    <div class="spot-foot">
      <span id="spotlight-count" aria-live="polite"></span>
      <span class="spot-keys">
        <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> select</span>
        <span><kbd>&crarr;</kbd> open</span>
        <span><kbd>esc</kbd> close</span>
      </span>
    </div>
  </div>
</div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
