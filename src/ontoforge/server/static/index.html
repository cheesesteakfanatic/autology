<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OntoForge</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%23F6F7F9'/%3E%3Cpath d='M8 3.4 8.7 7.3 12.6 8 8.7 8.7 8 12.6 7.3 8.7 3.4 8 7.3 7.3z' fill='%23313ECF'/%3E%3Ccircle cx='8' cy='8' r='1.5' fill='%2314161A'/%3E%3C/svg%3E">
<link rel="modulepreload" href="/static/app.js">
<link rel="modulepreload" href="/static/js/core.js">
<link rel="modulepreload" href="/static/js/bus.js">
<link rel="modulepreload" href="/static/js/agent.js">
<link rel="modulepreload" href="/static/js/artifacts.js">
<link rel="modulepreload" href="/static/js/spotlight.js">
<link rel="modulepreload" href="/static/js/constellation.js">
<link rel="modulepreload" href="/static/js/apps/registry.js">
<script src="/static/vendor/vega.min.js" defer></script>
<script src="/static/vendor/vega-lite.min.js" defer></script>
<script src="/static/vendor/vega-embed.min.js" defer></script>
</head>
<body>

<!-- ══════════════════════════════════════════════════════ top bar -->
<header id="menubar" class="bar">
  <div class="barL">
    <span class="brand" title="OntoForge">
      <span class="mark" aria-hidden="true">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M12 12l8-4.5M12 12v9M12 12L4 7.5"/></svg>
      </span>
      <span class="wm-onto">Onto</span><span class="dot" aria-hidden="true">&middot;</span><span class="wm-forge">Forge</span>
    </span>
  </div>
  <div class="status">
    <span class="live" title="connected to your live data"><i aria-hidden="true"></i>live</span>
    <span class="sep" aria-hidden="true"></span>
    <span class="meta-cell">your data <b id="meta-estate">&mdash;</b></span>
    <span class="meta-cell">source records <b id="meta-atoms">&mdash;</b></span>
    <span class="sep" aria-hidden="true"></span>
    <button class="spotlight-hint iconquiet" id="spotlight-hint" type="button"
            title="Search — jump to a thread or entity">
      <span class="sh-glass" aria-hidden="true">&#10038;</span><kbd>&#8984;K</kbd>
    </button>
    <button class="theme-toggle iconquiet" id="theme-toggle" type="button"
            title="toggle light / dark theme" aria-label="toggle light or dark theme">&#9789;</button>
  </div>
</header>

<!-- ══════════════════════════════════ the conversation-first shell -->
<div class="shell">

  <!-- ── left thread-history rail (localStorage-backed) ── -->
  <aside id="rail" class="rail" aria-label="thread history"></aside>

  <!-- ── the conversation reading column ── -->
  <main class="conv" aria-label="conversation">
    <div id="scroll" class="scroll">
      <div id="thread-col" class="col" role="log" aria-live="polite" aria-label="conversation thread"></div>
    </div>

    <!-- ── one persistent bottom composer ── -->
    <div class="composer">
      <div class="composer-inner">
        <form id="composer-form" class="cbox" autocomplete="off">
          <button class="cplus" id="composer-attach" type="button" title="Attach data" aria-label="attach data">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <input id="composer-input" class="cinput" type="text" spellcheck="false" autocomplete="off"
                 role="combobox" aria-autocomplete="list" aria-expanded="false"
                 aria-controls="composer-suggest"
                 aria-label="ask, build, or wire up your data"
                 placeholder="Ask, build, or wire up your data —">
          <button class="csend" type="submit" title="Send" aria-label="send">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
          </button>
        </form>
        <div id="composer-suggest" class="cs-drop" role="listbox" aria-label="suggestions" hidden></div>
        <div class="chint">
          <span class="k">It understands <span class="kb">questions</span></span>
          <span class="d" aria-hidden="true"></span>
          <span class="k"><span class="kb">charts</span></span>
          <span class="d" aria-hidden="true"></span>
          <span class="k">and <span class="kb">data-engineering ops</span></span>
          <span class="d" aria-hidden="true"></span>
          <span class="k">every answer carries its provenance</span>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- ══════════════════════════════════════════════════════ spotlight -->
<div id="spotlight" class="spotlight" hidden role="dialog" aria-label="search">
  <div class="spot-box">
    <input id="spotlight-input" class="spot-input" type="text" spellcheck="false"
           role="combobox" aria-expanded="false" aria-autocomplete="list"
           aria-controls="spotlight-results"
           placeholder="jump to a thread or entity, or just ask&hellip;">
    <div id="spotlight-results" class="spot-results" role="listbox" aria-label="results"></div>
    <div class="spot-foot">
      <span id="spotlight-count" aria-live="polite"></span>
      <span class="spot-keys">
        <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> select</span>
        <span><kbd>&crarr;</kbd> open</span>
        <span><kbd>esc</kbd> close</span>
      </span>
    </div>
  </div>
</div>

<script type="module" src="/static/app.js"></script>
</body>
</html>
